<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>TabLoop Options</title>
        <link rel="icon" type="image/png" href="/icon-48.png" />
        <style>
            body {
                font-family: system-ui, sans-serif;
                padding: 20px;
                background: #0f172a;
                color: #f8fafc;
            }
            .container {
                max-width: 600px;
                margin: 0 auto;
                background: rgba(255, 255, 255, 0.05);
                padding: 30px;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            h1 {
                margin-top: 0;
                margin-bottom: 24px;
                background: linear-gradient(to right, #60a5fa, #c084fc);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .setting {
                margin-bottom: 36px;
            }
            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
            }
            select,
            input[type="number"],
            input[type="text"] {
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(0, 0, 0, 0.2);
                color: white;
                font-size: 14px;
            }
            select {
                appearance: none;
                -webkit-appearance: none;
                -moz-appearance: none;
                background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
                background-repeat: no-repeat;
                background-position: right 16px center;
                background-size: 16px;
                padding-right: 44px;
                cursor: pointer;
            }
            select:focus,
            input[type="number"]:focus,
            input[type="text"]:focus {
                outline: 2px solid #3b82f6;
                border-color: transparent;
            }
            .checkbox-label {
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
            }
            .checkbox-label input {
                width: 18px;
                height: 18px;
                cursor: pointer;
            }
            .checkbox-group {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            button {
                background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                font-size: 16px;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }
            button:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            }
            #statusContainer {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-top: 30px;
                padding: 10px 16px;
                border-radius: 20px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.05);
                font-size: 13px;
                font-weight: 500;
                opacity: 0;
                transition: opacity 0.3s, transform 0.3s;
                transform: translateY(5px);
            }
            #statusContainer.visible {
                opacity: 1;
                transform: translateY(0);
            }
            #statusContainer.saving {
                color: rgba(255, 255, 255, 0.6);
            }
            #statusContainer.saved {
                color: #4ade80;
                border-color: rgba(74, 222, 128, 0.2);
                background: rgba(74, 222, 128, 0.05);
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            .spinner {
                animation: spin 1s linear infinite;
            }

            .input-group {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
            }
            .input-group input {
                flex: 1;
            }
            .sec-btn {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 500;
                transition:
                    background 0.2s,
                    transform 0.1s;
            }
            .sec-btn:hover {
                background: rgba(255, 255, 255, 0.18);
                transform: none;
                box-shadow: none;
            }
            .domain-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 16px;
                max-height: 180px;
                overflow-y: auto;
                padding: 10px;
                background: rgba(0, 0, 0, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                min-height: 48px;
                box-sizing: border-box;
            }
            .domain-list::-webkit-scrollbar {
                width: 6px;
            }
            .domain-list::-webkit-scrollbar-track {
                background: rgba(0, 0, 0, 0.1);
                border-radius: 3px;
            }
            .domain-list::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
            }
            .domain-entry {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(255, 255, 255, 0.03);
                padding: 8px 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                transition: background 0.2s;
            }
            .domain-entry:hover {
                background: rgba(255, 255, 255, 0.06);
            }
            .domain-info {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
            }
            .domain-favicon {
                width: 16px;
                height: 16px;
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.1);
                object-fit: contain;
            }
            .domain-remove {
                background: transparent;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                font-size: 16px;
                padding: 2px 6px;
                line-height: 1;
                border-radius: 4px;
                transition:
                    color 0.2s,
                    background 0.2s;
            }
            .domain-remove:hover {
                color: #ef4444;
                background: rgba(239, 68, 68, 0.1);
            }
            .suggestions-section {
                background: rgba(255, 255, 255, 0.02);
                padding: 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.03);
            }
            .suggestions-label {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.5);
                margin-bottom: 8px;
                font-weight: 500;
            }
            .pills-container {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.04);
                padding: 4px 10px;
                border-radius: 100px;
                font-size: 12px;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.1s,
                    border-color 0.2s;
                user-select: none;
            }
            .pill:hover {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.15);
                transform: scale(1.02);
            }
            .pill:active {
                transform: scale(0.98);
            }
            .setting-desc {
                display: block;
                font-size: 13px;
                color: rgba(255, 255, 255, 0.5);
                margin-top: 4px;
                margin-bottom: 8px;
                line-height: 1.4;
            }
            .input-with-unit {
                display: flex;
                align-items: center;
                box-sizing: border-box;
                padding: 0 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(0, 0, 0, 0.2);
                width: 100%;
            }
            .input-with-unit input[type="number"] {
                border: none !important;
                background: transparent !important;
                padding: 12px 0 !important;
                width: 100%;
                outline: none !important;
                color: white;
                font-size: 14px;
            }
            .input-with-unit:focus-within {
                outline: 2px solid #3b82f6;
                border-color: transparent;
            }
            .unit-text {
                color: rgba(255, 255, 255, 0.4);
                font-size: 14px;
                margin-left: 8px;
                user-select: none;
                pointer-events: none;
            }
            .tabs-limit-control {
                display: flex;
                align-items: center;
                gap: 8px;
                max-width: 220px;
            }
            .tabs-limit-control input[type="number"] {
                flex: 1;
                text-align: center;
                font-size: 20px !important;
                font-weight: 600;
                padding: 10px !important;
                -moz-appearance: textfield;
            }
            .tabs-limit-control input[type="number"]::-webkit-outer-spin-button,
            .tabs-limit-control input[type="number"]::-webkit-inner-spin-button {
                -webkit-appearance: none;
                margin: 0;
            }
            .limit-adjust-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 44px;
                height: 44px;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: white;
                border-radius: 8px;
                cursor: pointer;
                font-size: 22px;
                font-weight: 600;
                transition:
                    background 0.2s,
                    transform 0.1s,
                    border-color 0.2s;
                padding: 0;
                user-select: none;
            }
            .limit-adjust-btn:hover {
                background: rgba(255, 255, 255, 0.2);
                border-color: rgba(255, 255, 255, 0.3);
                transform: scale(1.05);
                box-shadow: none;
            }
            .limit-adjust-btn:active {
                transform: scale(0.95);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>TabLoop Settings</h1>

            <div class="setting">
                <label for="maxTabs">Maximum Tabs Limit</label>
                <div class="tabs-limit-control">
                    <button type="button" id="decrementLimit" class="limit-adjust-btn">&minus;</button>
                    <input
                        type="number"
                        id="maxTabs"
                        min="1"
                        max="500"
                        value="100"
                    />
                    <button type="button" id="incrementLimit" class="limit-adjust-btn">&plus;</button>
                </div>
            </div>

            <div class="setting">
                <label for="limitScope">Limit Scope</label>
                <select id="limitScope">
                    <option value="global">Global (All Windows)</option>
                    <option value="per-window">Per Window</option>
                </select>
            </div>

            <div class="setting">
                <label for="limitBehavior">When tab limit is reached</label>
                <select id="limitBehavior">
                    <option value="focus">Shift focus to the oldest tab in its window</option>
                    <option value="move">Move oldest tab to the new tab's window</option>
                </select>
            </div>

            <div class="setting checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="excludePinned" />
                    Exclude Pinned Tabs from being moved
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="syncStash" />
                    Sync Stashed Tabs across devices
                </label>
            </div>

            <div class="setting">
                <label for="oldestDefinition"
                    >Which tab gets surfaced first?</label
                >
                <select id="oldestDefinition">
                    <option value="lru">
                        Least Recently Used (longest since you viewed it)
                    </option>
                    <option value="creation">
                        Oldest (opened longest ago)
                    </option>
                </select>
            </div>

            <div class="setting">
                <label for="resurfaceCooldown">Resurface Cooldown period</label>
                <span class="setting-desc">
                    Recently re-surfaced tabs are prevented from re-surfacing
                    again for:
                </span>
                <div class="tabs-limit-control" style="max-width: 280px;">
                    <button type="button" id="decrementCooldown" class="limit-adjust-btn">&minus;</button>
                    <input
                        type="number"
                        id="resurfaceCooldown"
                        min="0"
                        max="1440"
                        value="5"
                    />
                    <button type="button" id="incrementCooldown" class="limit-adjust-btn">&plus;</button>
                    <span class="unit-text" style="margin-left: 4px;">minutes</span>
                </div>
                <span class="setting-desc"> Set to 0 to disable. </span>
            </div>

            <div class="setting">
                <label>Skip these domains when resurfacing</label>
                <div class="domain-list" id="skipDomainList"></div>
                <div class="input-group">
                    <input
                        type="text"
                        id="skipDomainInput"
                        placeholder="e.g. youtube.com"
                    />
                    <button id="addSkipDomainBtn" class="sec-btn" type="button">
                        Add
                    </button>
                </div>
                <div class="suggestions-section">
                    <div class="suggestions-label">
                        Suggestions from open tabs:
                    </div>
                    <div class="pills-container" id="skipSuggestions"></div>
                </div>
            </div>

            <div class="setting">
                <label>Prioritize these domains when resurfacing</label>
                <div class="domain-list" id="priorityDomainList"></div>
                <div class="input-group">
                    <input
                        type="text"
                        id="priorityDomainInput"
                        placeholder="e.g. github.com or keyword"
                    />
                    <button
                        id="addPriorityDomainBtn"
                        class="sec-btn"
                        type="button"
                    >
                        Add
                    </button>
                </div>
                <div class="suggestions-section">
                    <div class="suggestions-label">
                        Suggestions from open tabs:
                    </div>
                    <div class="pills-container" id="prioritySuggestions"></div>
                </div>
            </div>

            <div id="statusContainer">
                <span id="statusIcon"></span>
                <span id="statusText">Settings saved automatically!</span>
            </div>
        </div>
        <script type="module" src="/src/options.ts"></script>
    </body>
</html>
