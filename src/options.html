<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>TabLoop Options</title>
        <link rel="icon" type="image/png" href="/icon-48.png" />
        <style>
            body {
                font-family: system-ui, sans-serif;
                padding: 20px;
                background: #0f172a;
                color: #f8fafc;
            }
            .container {
                max-width: 600px;
                margin: 0 auto;
                background: rgba(255, 255, 255, 0.05);
                padding: 30px;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            h1 {
                margin-top: 0;
                margin-bottom: 24px;
                background: linear-gradient(to right, #60a5fa, #c084fc);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .setting {
                margin-bottom: 36px;
            }
            label {
                display: block;
                margin-bottom: 8px;
                font-weight: 500;
            }
            select,
            input[type="number"],
            input[type="text"] {
                width: 100%;
                box-sizing: border-box;
                padding: 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                background: rgba(0, 0, 0, 0.2);
                color: white;
                font-size: 14px;
            }
            select:focus,
            input[type="number"]:focus,
            input[type="text"]:focus {
                outline: 2px solid #3b82f6;
                border-color: transparent;
            }
            .checkbox-label {
                display: flex;
                align-items: center;
                gap: 10px;
                cursor: pointer;
            }
            .checkbox-label input {
                width: 18px;
                height: 18px;
                cursor: pointer;
            }
            .checkbox-group {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            button {
                background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                font-size: 16px;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
            }
            button:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            }
            #status {
                margin-left: 15px;
                color: #4ade80;
                opacity: 0;
                transition: opacity 0.3s;
                font-weight: 500;
            }

            .input-group {
                display: flex;
                gap: 8px;
                margin-bottom: 12px;
            }
            .input-group input {
                flex: 1;
            }
            .sec-btn {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 500;
                transition:
                    background 0.2s,
                    transform 0.1s;
            }
            .sec-btn:hover {
                background: rgba(255, 255, 255, 0.18);
                transform: none;
                box-shadow: none;
            }
            .domain-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
                margin-bottom: 16px;
                max-height: 180px;
                overflow-y: auto;
                padding: 10px;
                background: rgba(0, 0, 0, 0.2);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 8px;
                min-height: 48px;
                box-sizing: border-box;
            }
            .domain-list::-webkit-scrollbar {
                width: 6px;
            }
            .domain-list::-webkit-scrollbar-track {
                background: rgba(0, 0, 0, 0.1);
                border-radius: 3px;
            }
            .domain-list::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
            }
            .domain-entry {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(255, 255, 255, 0.03);
                padding: 8px 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                transition: background 0.2s;
            }
            .domain-entry:hover {
                background: rgba(255, 255, 255, 0.06);
            }
            .domain-info {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 14px;
            }
            .domain-favicon {
                width: 16px;
                height: 16px;
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.1);
                object-fit: contain;
            }
            .domain-remove {
                background: transparent;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                font-size: 16px;
                padding: 2px 6px;
                line-height: 1;
                border-radius: 4px;
                transition:
                    color 0.2s,
                    background 0.2s;
            }
            .domain-remove:hover {
                color: #ef4444;
                background: rgba(239, 68, 68, 0.1);
            }
            .suggestions-section {
                background: rgba(255, 255, 255, 0.02);
                padding: 12px;
                border-radius: 8px;
                border: 1px solid rgba(255, 255, 255, 0.03);
            }
            .suggestions-label {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.5);
                margin-bottom: 8px;
                font-weight: 500;
            }
            .pills-container {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }
            .pill {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.04);
                padding: 4px 10px;
                border-radius: 100px;
                font-size: 12px;
                cursor: pointer;
                transition:
                    background 0.2s,
                    transform 0.1s,
                    border-color 0.2s;
                user-select: none;
            }
            .pill:hover {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.15);
                transform: scale(1.02);
            }
            .pill:active {
                transform: scale(0.98);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>TabLoop Settings</h1>

            <div class="setting">
                <label for="maxTabs">Maximum Tabs Limit</label>
                <input
                    type="number"
                    id="maxTabs"
                    min="1"
                    max="500"
                    value="100"
                />
            </div>

            <div class="setting">
                <label for="limitScope">Limit Scope</label>
                <select id="limitScope">
                    <option value="global">Global (All Windows)</option>
                    <option value="per-window">Per Window</option>
                </select>
            </div>

            <div class="setting">
                <label for="oldestDefinition"
                    >Which tab gets surfaced first?</label
                >
                <select id="oldestDefinition">
                    <option value="lru">
                        Least Recently Used (longest since you viewed it)
                    </option>
                    <option value="creation">
                        Oldest (opened longest ago)
                    </option>
                </select>
            </div>
            <div class="setting checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="excludePinned" />
                    Exclude Pinned Tabs from being moved
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="syncStash" />
                    Sync Stashed Tabs across devices
                </label>
            </div>

            <div class="setting">
                <label>Skip these domains when resurfacing</label>
                <div class="domain-list" id="skipDomainList"></div>
                <div class="input-group">
                    <input
                        type="text"
                        id="skipDomainInput"
                        placeholder="e.g. youtube.com"
                    />
                    <button id="addSkipDomainBtn" class="sec-btn" type="button">
                        Add
                    </button>
                </div>
                <div class="suggestions-section">
                    <div class="suggestions-label">
                        Suggestions from open tabs:
                    </div>
                    <div class="pills-container" id="skipSuggestions"></div>
                </div>
            </div>

            <div class="setting">
                <label>Prioritize these domains when resurfacing</label>
                <div class="domain-list" id="priorityDomainList"></div>
                <div class="input-group">
                    <input
                        type="text"
                        id="priorityDomainInput"
                        placeholder="e.g. github.com or keyword"
                    />
                    <button
                        id="addPriorityDomainBtn"
                        class="sec-btn"
                        type="button"
                    >
                        Add
                    </button>
                </div>
                <div class="suggestions-section">
                    <div class="suggestions-label">
                        Suggestions from open tabs:
                    </div>
                    <div class="pills-container" id="prioritySuggestions"></div>
                </div>
            </div>

            <div style="display: flex; align-items: center; margin-top: 30px">
                <button id="saveBtn">Save Settings</button>
                <span id="status">Settings saved successfully!</span>
            </div>
        </div>
        <script type="module" src="/src/options.ts"></script>
    </body>
</html>
