<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TabLoop Options</title>
  <link rel="icon" type="image/png" href="/icon-48.png" />
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; background: #0f172a; color: #f8fafc; }
    .container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
    h1 { margin-top: 0; margin-bottom: 24px; background: linear-gradient(to right, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .setting { margin-bottom: 36px; }
    label { display: block; margin-bottom: 8px; font-weight: 500; }
    select, input[type="number"] { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-size: 14px; }
    select:focus, input[type="number"]:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    .checkbox-label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .checkbox-label input { width: 18px; height: 18px; cursor: pointer; }
    .checkbox-group { display: flex; flex-direction: column; gap: 16px; }
    button { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.2s, box-shadow 0.2s; }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
    #status { margin-left: 15px; color: #4ade80; opacity: 0; transition: opacity 0.3s; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TabLoop Settings</h1>
    
    <div class="setting">
      <label for="maxTabs">Maximum Tabs Limit</label>
      <input type="number" id="maxTabs" min="1" max="500" value="100">
    </div>
    
    <div class="setting">
      <label for="limitScope">Limit Scope</label>
      <select id="limitScope">
        <option value="global">Global (All Windows)</option>
        <option value="per-window">Per Window</option>
      </select>
    </div>
    
    <div class="setting">
      <label for="oldestDefinition">Which tab gets surfaced first?</label>
      <select id="oldestDefinition">
        <option value="lru">Least Recently Used (longest since you viewed it)</option>
        <option value="creation">Oldest (opened longest ago)</option>
      </select>
    </div>
    <div class="setting checkbox-group">
      <label class="checkbox-label">
        <input type="checkbox" id="excludePinned">
        Exclude Pinned Tabs from being moved
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="excludeIncognito">
        Exclude Incognito Tabs from the limit
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="syncStash">
        Sync Stashed Tabs across devices
      </label>
    </div>

    <div style="display: flex; align-items: center; margin-top: 30px;">
      <button id="saveBtn">Save Settings</button>
      <span id="status">Settings saved successfully!</span>
    </div>
  </div>
  <script type="module" src="/src/options.ts"></script>
</body>
</html>
